<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week-5 3-2-26 Task</title>
    <link rel="stylesheet" href="week2.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
    </style>
</head>
<body>
    <h2>PERSONAL DETAIL</h2>
    <form class="form"> 
        <label for="fname">First Name</label>
        <input type="text" id="fname" placeholder="Enter your first name">
        <br><br>
        <label for="lname">Last Name</label>
        <input type="text" id="lname" placeholder="Enter your last name">
        <br><br>
        <label for="age">Age</label>
        <input type="number" id="age" min="1" max="100">
        <br><br>
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Enter your email">
        <br><br>
        <label for="contact">Contact</label>
        <input type="tel" id="contact" pattern="[0-9]{10}" placeholder="Enter your valid 10 digit no.">
        <br><br>
        <label for="address">Address</label><br>
        <textarea id="address" placeholder="Enter your address"></textarea>
        <br><br>
        <label for="date">DOB</label>
        <input type="date" id="dob">
        <br><br>
        <label for="myfile">Select a File</label><br>
        <input type="file" id="myfile" name="myfile">
        <br><br>
        <button class="btn">SUBMIT</button>
    </form>
<script>
    $(document).ready(function(){
        $(".form").submit(function(e){

        let valid = true;

        // First Name
        if($("#fname").val() == ""){
            $("#fname").css("border","2px solid red")
                       .attr("placeholder","Invalid");
            valid = false;
        }

        // Last Name
        if($("#lname").val() == ""){
            $("#lname").css("border","2px solid red")
                       .attr("placeholder","Invalid");
            valid = false;
        }

        // Age
        if($("#age").val() == ""){
            $("#age").css("border","2px solid red");
            valid = false;
        }

        // Email
        if($("#email").val() == ""){
            $("#email").css("border","2px solid red")
                        .attr("placeholder","Invalid");
            valid = false;
        }

        // Contact
        if($("#contact").val() == ""){
            $("#contact").css("border","2px solid red")
                          .attr("placeholder","Invalid");
            valid = false;
        }

        // Address
        if($("#address").val() == ""){
            $("#address").css("border","2px solid red")
                          .attr("placeholder","Invalid");
            valid = false;
        }

        // DOB
        if($("#dob").val() == ""){
            $("#dob").css("border","2px solid red");
            valid = false;
        }

        // File
        if($("#myfile").val() == ""){
            $("#myfile").css("border","2px solid red");
            valid = false;
        }

        // Stop submit if any invalid
        if(!valid){
            e.preventDefault();
        }

        });

    });

    $(".form input, .form textarea").on("input", function(){
        $(this).css("border","1px solid green");
    });

</script>

</body>
</html>
