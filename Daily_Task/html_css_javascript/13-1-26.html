<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <link rel="stylesheet" href="fr.css">
</head>
<body>
    <div class="box fade-in"> Fade-in</div>
    <div class="box fade-out"> Fade-out</div>
    <div class="box zoom-in"> Zoom-in</div>
    <div class="box zoom-out"> Zoom-out</div>
    <div class="box rotate"> Rotate</div>
    <div class="box pulse"> Pulse</div>
    <div class="box slide-left"> Slide-left</div>
    <div class="box slide-right"> Slide-right</div>
    <div class="box slide-up"> Slide-up</div>
    <div class="box slide-down"> Slide-down</div>
    <div class="box bounce"> Bounce</div>
    <div class="box shake"> Shake</div>
    <div class="box flip"> Flip</div>
    <div class="box swing"> Swing</div>
    <div class="box blur-in"> Blur-in</div>
    <div class="box blur-out"> Blur-out</div>
    <div class="box glow"> Glow</div>

</html>
