<body>
    <div id="box1" style="height: 100px; width:100px; background-color: red;display: none;"></div>
    <div id="box2" style="height: 100px; width:100px; background-color: rgb(0, 255, 0);display: none;"></div>
    <div id="box3" style="height: 100px; width:100px; background-color: rgb(4, 0, 255);display: none;"></div>
    
    <button id="btn">fadeIn/Out</button>

<script>

    $(document).ready(function(){
        $("#btn").click(function(){
            $("#box1").fadeToggle(1000);
            $("#box2").fadeToggle(2000);
            $("#box3").fadeToggle(3000);
        });
    })
